  POSTGRES_JDBC_PARAMS: ${POSTGRES_JDBC_PARAMS:-}
x-spark-public-env:
  SPARK_PUBLIC_HOST: ${SPARK_PUBLIC_HOST:?Set SPARK_PUBLIC_HOST to the host IP or DNS name reachable by Spark clients/workers}
  SPARK_MASTER_BIND_HOST: ${SPARK_MASTER_BIND_HOST:-}
  SPARK_WORKER_BIND_HOST: ${SPARK_WORKER_BIND_HOST:-}
  SPARK_THRIFT_BIND_HOST: ${SPARK_THRIFT_BIND_HOST:-}
  SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-}
  HIVE_METASTORE_BIND_HOST: ${HIVE_METASTORE_BIND_HOST:-}
  SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
  SPARK_MASTER_WEBUI_PORT: ${SPARK_MASTER_WEBUI_PORT:-8080}
  SPARK_WORKER_PUBLIC_HOST: ${SPARK_WORKER_PUBLIC_HOST:-}
  SPARK_WORKER_PORT: ${SPARK_WORKER_PORT:-7078}
  SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_WEBUI_PORT:-8081}
  SPARK_THRIFT_PUBLIC_HOST: ${SPARK_THRIFT_PUBLIC_HOST:-}
  SPARK_THRIFT_PORT: ${SPARK_THRIFT_PORT:-10000}
  SPARK_THRIFT_UI_PORT: ${SPARK_THRIFT_UI_PORT:-4040}
  SPARK_THRIFT_DRIVER_PORT: ${SPARK_THRIFT_DRIVER_PORT:-39000}
  SPARK_THRIFT_BLOCKMANAGER_PORT: ${SPARK_THRIFT_BLOCKMANAGER_PORT:-39001}
  HIVE_METASTORE_PUBLIC_HOST: ${HIVE_METASTORE_PUBLIC_HOST:-}
  HIVE_METASTORE_PORT: ${HIVE_METASTORE_PORT:-9083}
  HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-}
x-common-env:
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  no_proxy: ${no_proxy:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-lakehouse-user}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-lakehouse-password}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://host.docker.internal:9000}
  S3_WAREHOUSE: ${S3_WAREHOUSE:-s3a://lakehouse/warehouse}
  S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
  S3_SSL_ENABLED: ${S3_SSL_ENABLED:-false}
  POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-hive}
  POSTGRES_USER: ${POSTGRES_USER:-hive}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive123}
  POSTGRES_JDBC_PARAMS: ${POSTGRES_JDBC_PARAMS:-}
  SPARK_PUBLIC_HOST: ${SPARK_PUBLIC_HOST:?Set SPARK_PUBLIC_HOST to the host IP or DNS name reachable by Spark clients/workers}
  SPARK_MASTER_BIND_HOST: ${SPARK_MASTER_BIND_HOST:-}
  SPARK_WORKER_BIND_HOST: ${SPARK_WORKER_BIND_HOST:-}
  SPARK_THRIFT_BIND_HOST: ${SPARK_THRIFT_BIND_HOST:-}
  SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-}
  HIVE_METASTORE_BIND_HOST: ${HIVE_METASTORE_BIND_HOST:-}
  SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
  SPARK_MASTER_WEBUI_PORT: ${SPARK_MASTER_WEBUI_PORT:-8080}
  SPARK_WORKER_PUBLIC_HOST: ${SPARK_WORKER_PUBLIC_HOST:-}
  SPARK_WORKER_PORT: ${SPARK_WORKER_PORT:-7078}
  SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_WEBUI_PORT:-8081}
  SPARK_THRIFT_PUBLIC_HOST: ${SPARK_THRIFT_PUBLIC_HOST:-}
  SPARK_THRIFT_PORT: ${SPARK_THRIFT_PORT:-10000}
  SPARK_THRIFT_UI_PORT: ${SPARK_THRIFT_UI_PORT:-4040}
  SPARK_THRIFT_DRIVER_PORT: ${SPARK_THRIFT_DRIVER_PORT:-39000}
  SPARK_THRIFT_BLOCKMANAGER_PORT: ${SPARK_THRIFT_BLOCKMANAGER_PORT:-39001}
  HIVE_METASTORE_PUBLIC_HOST: ${HIVE_METASTORE_PUBLIC_HOST:-}
  HIVE_METASTORE_PORT: ${HIVE_METASTORE_PORT:-9083}
  HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-}
services:
  lakehouse-config:
    image: alpine:3.20
    container_name: lakehouse-config
    restart: 'no'
    cpus: ${LAKEHOUSE_CONFIG_CPUS:-0.25}
    mem_limit: ${LAKEHOUSE_CONFIG_MEMORY:-256m}
    network_mode: host
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      no_proxy: ${no_proxy:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-lakehouse-user}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-lakehouse-password}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://host.docker.internal:9000}
      S3_WAREHOUSE: ${S3_WAREHOUSE:-s3a://lakehouse/warehouse}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_SSL_ENABLED: ${S3_SSL_ENABLED:-false}
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hive}
      POSTGRES_USER: ${POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive123}
      POSTGRES_JDBC_PARAMS: ${POSTGRES_JDBC_PARAMS:-}
      SPARK_PUBLIC_HOST: ${SPARK_PUBLIC_HOST:?Set SPARK_PUBLIC_HOST to the host IP or DNS name reachable by Spark clients/workers}
      SPARK_MASTER_BIND_HOST: ${SPARK_MASTER_BIND_HOST:-}
      SPARK_WORKER_BIND_HOST: ${SPARK_WORKER_BIND_HOST:-}
      SPARK_THRIFT_BIND_HOST: ${SPARK_THRIFT_BIND_HOST:-}
      SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-}
      HIVE_METASTORE_BIND_HOST: ${HIVE_METASTORE_BIND_HOST:-}
      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
      SPARK_MASTER_WEBUI_PORT: ${SPARK_MASTER_WEBUI_PORT:-8080}
      SPARK_WORKER_PUBLIC_HOST: ${SPARK_WORKER_PUBLIC_HOST:-}
      SPARK_WORKER_PORT: ${SPARK_WORKER_PORT:-7078}
      SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_WEBUI_PORT:-8081}
      SPARK_THRIFT_PUBLIC_HOST: ${SPARK_THRIFT_PUBLIC_HOST:-}
      SPARK_THRIFT_PORT: ${SPARK_THRIFT_PORT:-10000}
      SPARK_THRIFT_UI_PORT: ${SPARK_THRIFT_UI_PORT:-4040}
      SPARK_THRIFT_DRIVER_PORT: ${SPARK_THRIFT_DRIVER_PORT:-39000}
      SPARK_THRIFT_BLOCKMANAGER_PORT: ${SPARK_THRIFT_BLOCKMANAGER_PORT:-39001}
      HIVE_METASTORE_PUBLIC_HOST: ${HIVE_METASTORE_PUBLIC_HOST:-}
      HIVE_METASTORE_PORT: ${HIVE_METASTORE_PORT:-9083}
      HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-}
    volumes:
    - lakehouse-conf:/opt/lakehouse/conf
    command:
    - /bin/sh
    - -ec
    - |
      mkdir -p /opt/lakehouse/conf

      HIVE_METASTORE_ADVERTISED_HOST="$${HIVE_METASTORE_PUBLIC_HOST:-$${SPARK_PUBLIC_HOST}}"
      HIVE_METASTORE_ADVERTISED_PORT="$${HIVE_METASTORE_PORT:-9083}"
      HIVE_METASTORE_EFFECTIVE_URI="$${HIVE_METASTORE_URI:-thrift://$${HIVE_METASTORE_ADVERTISED_HOST}:$${HIVE_METASTORE_ADVERTISED_PORT}}"
      HIVE_METASTORE_EFFECTIVE_BIND_HOST="$${HIVE_METASTORE_BIND_HOST:-$${HIVE_METASTORE_ADVERTISED_HOST}}"
      SPARK_MASTER_EFFECTIVE_BIND_HOST="$${SPARK_MASTER_BIND_HOST:-$${SPARK_PUBLIC_HOST}}"
      SPARK_DRIVER_EFFECTIVE_BIND_ADDRESS="$${SPARK_DRIVER_BIND_ADDRESS:-$${SPARK_PUBLIC_HOST}}"
      SPARK_MASTER_URL="spark://$${SPARK_PUBLIC_HOST}:$${SPARK_MASTER_PORT}"

      JAVA_NON_PROXY_HOSTS="$${no_proxy:-localhost,127.0.0.1}"
      JAVA_NON_PROXY_HOSTS="$$(printf '%s' "$${JAVA_NON_PROXY_HOSTS}" | sed 's/[[:space:]]//g; s/,/|/g; s/^\./*./; s/|\./|*./g')"
      JAVA_PROXY_OPTIONS="-Dhttp.nonProxyHosts=$${JAVA_NON_PROXY_HOSTS} -Dhttps.nonProxyHosts=$${JAVA_NON_PROXY_HOSTS}"
      echo "Java non-proxy hosts: $${JAVA_NON_PROXY_HOSTS}"

      echo "Spark public host: $${SPARK_PUBLIC_HOST}"
      echo "Spark master URL: $${SPARK_MASTER_URL}"
      echo "Spark master bind host: $${SPARK_MASTER_EFFECTIVE_BIND_HOST}"
      echo "Spark default driver bind address: $${SPARK_DRIVER_EFFECTIVE_BIND_ADDRESS}"
      echo "Hive Metastore URI for Spark clients: $${HIVE_METASTORE_EFFECTIVE_URI}"
      echo "Hive Metastore bind host: $${HIVE_METASTORE_EFFECTIVE_BIND_HOST}"

      cat > /opt/lakehouse/conf/hive-site.xml <<EOF_HIVE
      <?xml version="1.0"?>
      <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
      <configuration>
        <property>
          <name>hive.metastore.uris</name>
          <value>$${HIVE_METASTORE_EFFECTIVE_URI}</value>
        </property>
        <property>
          <name>hive.metastore.thrift.bind.host</name>
          <value>$${HIVE_METASTORE_EFFECTIVE_BIND_HOST}</value>
        </property>
        <property>
          <name>javax.jdo.option.ConnectionURL</name>
          <value>jdbc:postgresql://$${POSTGRES_HOST}:$${POSTGRES_PORT}/$${POSTGRES_DB}$${POSTGRES_JDBC_PARAMS}</value>
        </property>
        <property>
          <name>javax.jdo.option.ConnectionDriverName</name>
          <value>org.postgresql.Driver</value>
        </property>
        <property>
          <name>javax.jdo.option.ConnectionUserName</name>
          <value>$${POSTGRES_USER}</value>
        </property>
        <property>
          <name>javax.jdo.option.ConnectionPassword</name>
          <value>$${POSTGRES_PASSWORD}</value>
        </property>
        <property>
          <name>datanucleus.autoCreateSchema</name>
          <value>false</value>
        </property>
        <property>
          <name>hive.metastore.schema.verification</name>
          <value>true</value>
        </property>
        <property>
          <name>hive.metastore.warehouse.dir</name>
          <value>$${S3_WAREHOUSE}</value>
        </property>
        <!-- Proxy handling is applied through Spark JVM options and environment variables.
             S3A proxy properties are intentionally not set here so S3_ENDPOINT can bypass the proxy via no_proxy/nonProxyHosts. -->
        <property>
          <name>fs.s3a.impl</name>
          <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
        </property>
        <property>
          <name>fs.s3a.endpoint</name>
          <value>$${S3_ENDPOINT}</value>
        </property>
        <!-- Keep the S3A endpoint direct. Proxy values are passed as environment variables,
             while Java proxy bypass is generated in spark-defaults.conf from no_proxy. -->
        <property>
          <name>fs.s3a.path.style.access</name>
          <value>$${S3_PATH_STYLE_ACCESS}</value>
        </property>
        <property>
          <name>fs.s3a.connection.ssl.enabled</name>
          <value>$${S3_SSL_ENABLED}</value>
        </property>
        <property>
          <name>fs.s3a.aws.credentials.provider</name>
          <value>org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider</value>
        </property>
        <property>
          <name>fs.s3a.access.key</name>
          <value>$${AWS_ACCESS_KEY_ID}</value>
        </property>
        <property>
          <name>fs.s3a.secret.key</name>
          <value>$${AWS_SECRET_ACCESS_KEY}</value>
        </property>
      </configuration>
      EOF_HIVE

      cat > /opt/lakehouse/conf/core-site.xml <<EOF_CORE
      <configuration>
        <property>
          <name>fs.s3a.impl</name>
          <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
        </property>
        <property>
          <name>fs.s3a.endpoint</name>
          <value>$${S3_ENDPOINT}</value>
        </property>
        <!-- Keep the S3A endpoint direct. Proxy values are passed as environment variables,
             while Java proxy bypass is generated in spark-defaults.conf from no_proxy. -->
        <property>
          <name>fs.s3a.path.style.access</name>
          <value>$${S3_PATH_STYLE_ACCESS}</value>
        </property>
        <property>
          <name>fs.s3a.connection.ssl.enabled</name>
          <value>$${S3_SSL_ENABLED}</value>
        </property>
        <property>
          <name>fs.s3a.aws.credentials.provider</name>
          <value>org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider</value>
        </property>
        <property>
          <name>fs.s3a.access.key</name>
          <value>$${AWS_ACCESS_KEY_ID}</value>
        </property>
        <property>
          <name>fs.s3a.secret.key</name>
          <value>$${AWS_SECRET_ACCESS_KEY}</value>
        </property>
        <property>
          <name>fs.s3a.endpoint.region</name>
          <value>$${AWS_REGION}</value>
        </property>
        <property>
          <name>fs.s3a.attempts.maximum</name>
          <value>5</value>
        </property>
      </configuration>
      EOF_CORE

      cat > /opt/lakehouse/conf/spark-defaults.conf <<EOF_SPARK
      spark.master                                      $${SPARK_MASTER_URL}
      spark.driver.bindAddress                         $${SPARK_DRIVER_EFFECTIVE_BIND_ADDRESS}
      spark.network.timeout                            300s

      spark.sql.catalogImplementation                  hive
      spark.hadoop.hive.metastore.uris                 $${HIVE_METASTORE_EFFECTIVE_URI}
      spark.sql.hive.metastore.version                 3.1.3
      spark.sql.hive.metastore.jars                    path
      spark.sql.hive.metastore.jars.path               /opt/lakehouse/jars/ivy/*
      spark.sql.warehouse.dir                          $${S3_WAREHOUSE}

      spark.driver.extraClassPath                      /opt/lakehouse/jars/spark/*
      spark.executor.extraClassPath                    /opt/lakehouse/jars/spark/*

      spark.driverEnv.HTTP_PROXY                     $${HTTP_PROXY}
      spark.driverEnv.HTTPS_PROXY                    $${HTTPS_PROXY}
      spark.driverEnv.no_proxy                       $${no_proxy}
      spark.executorEnv.HTTP_PROXY                   $${HTTP_PROXY}
      spark.executorEnv.HTTPS_PROXY                  $${HTTPS_PROXY}
      spark.executorEnv.no_proxy                     $${no_proxy}
      spark.driver.extraJavaOptions                  $${JAVA_PROXY_OPTIONS}
      spark.executor.extraJavaOptions                $${JAVA_PROXY_OPTIONS}

      spark.sql.extensions                             io.delta.sql.DeltaSparkSessionExtension,org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
      spark.sql.catalog.spark_catalog                  org.apache.spark.sql.delta.catalog.DeltaCatalog

      spark.sql.catalog.iceberg                        org.apache.iceberg.spark.SparkCatalog
      spark.sql.catalog.iceberg.type                   hive
      spark.sql.catalog.iceberg.uri                    $${HIVE_METASTORE_EFFECTIVE_URI}
      spark.sql.catalog.iceberg.warehouse              $${S3_WAREHOUSE}

      spark.hadoop.fs.s3a.impl                         org.apache.hadoop.fs.s3a.S3AFileSystem
      spark.hadoop.fs.s3a.endpoint                     $${S3_ENDPOINT}
      spark.hadoop.fs.s3a.path.style.access            $${S3_PATH_STYLE_ACCESS}
      spark.hadoop.fs.s3a.connection.ssl.enabled       $${S3_SSL_ENABLED}
      spark.hadoop.fs.s3a.aws.credentials.provider     org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
      spark.hadoop.fs.s3a.access.key                   $${AWS_ACCESS_KEY_ID}
      spark.hadoop.fs.s3a.secret.key                   $${AWS_SECRET_ACCESS_KEY}
      spark.hadoop.fs.s3a.endpoint.region              $${AWS_REGION}

      spark.eventLog.enabled                           false
      EOF_SPARK

      echo "Generated Hive and Spark configuration:"
      ls -l /opt/lakehouse/conf
  hive-metastore-init:
    image: apache/hive:3.1.3
    container_name: lakehouse-hive-metastore-init
    user: root
    entrypoint:
    - /bin/bash
    - -lc
    restart: 'no'
    cpus: ${HIVE_METASTORE_INIT_CPUS:-1.00}
    mem_limit: ${HIVE_METASTORE_INIT_MEMORY:-1g}
    network_mode: host
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      no_proxy: ${no_proxy:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-lakehouse-user}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-lakehouse-password}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://host.docker.internal:9000}
      S3_WAREHOUSE: ${S3_WAREHOUSE:-s3a://lakehouse/warehouse}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_SSL_ENABLED: ${S3_SSL_ENABLED:-false}
      POSTGRES_HOST: ${POSTGRES_HOST:-host.docker.internal}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-hive}
      POSTGRES_USER: ${POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive123}
      POSTGRES_JDBC_PARAMS: ${POSTGRES_JDBC_PARAMS:-}
      SPARK_PUBLIC_HOST: ${SPARK_PUBLIC_HOST:?Set SPARK_PUBLIC_HOST to the host IP or DNS name reachable by Spark clients/workers}
      SPARK_MASTER_BIND_HOST: ${SPARK_MASTER_BIND_HOST:-}
      SPARK_WORKER_BIND_HOST: ${SPARK_WORKER_BIND_HOST:-}
      SPARK_THRIFT_BIND_HOST: ${SPARK_THRIFT_BIND_HOST:-}
      SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-}
      HIVE_METASTORE_BIND_HOST: ${HIVE_METASTORE_BIND_HOST:-}
      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
      SPARK_MASTER_WEBUI_PORT: ${SPARK_MASTER_WEBUI_PORT:-8080}
      SPARK_WORKER_PUBLIC_HOST: ${SPARK_WORKER_PUBLIC_HOST:-}
      SPARK_WORKER_PORT: ${SPARK_WORKER_PORT:-7078}
      SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_WEBUI_PORT:-8081}
      SPARK_THRIFT_PUBLIC_HOST: ${SPARK_THRIFT_PUBLIC_HOST:-}
      SPARK_THRIFT_PORT: ${SPARK_THRIFT_PORT:-10000}
      SPARK_THRIFT_UI_PORT: ${SPARK_THRIFT_UI_PORT:-4040}
      SPARK_THRIFT_DRIVER_PORT: ${SPARK_THRIFT_DRIVER_PORT:-39000}
      SPARK_THRIFT_BLOCKMANAGER_PORT: ${SPARK_THRIFT_BLOCKMANAGER_PORT:-39001}
      HIVE_METASTORE_PUBLIC_HOST: ${HIVE_METASTORE_PUBLIC_HOST:-}
      HIVE_METASTORE_PORT: ${HIVE_METASTORE_PORT:-9083}
      HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-}
      HIVE_AUX_JARS_PATH: /opt/hive/ext-jars
      HADOOP_CLASSPATH: /opt/hive/ext-jars/*
    volumes:
    - lakehouse-conf:/opt/lakehouse/conf:ro
    - ${LOCAL_JARS_DIR:-./lakehouse-jars}/hive:/opt/hive/ext-jars:ro
    command:
    - |
      set -euo pipefail
      wait_for_file() {
        target="$${1}"
        label="$${2}"
        for i in $$(seq 1 60); do
          if ls $${target} >/dev/null 2>&1; then
            echo "$${label} is available: $${target}"
            return 0
          fi
          sleep 1
        done
        echo "ERROR: timed out waiting for $${label}: $${target}" >&2
        exit 1
      }

      wait_for_file "/opt/lakehouse/conf/hive-site.xml" "hive-site.xml"
      wait_for_file "/opt/lakehouse/conf/core-site.xml" "core-site.xml"
      wait_for_file "/opt/hive/ext-jars/postgresql-*.jar" "PostgreSQL JDBC driver"
      wait_for_file "/opt/hive/ext-jars/hadoop-aws-*.jar" "hadoop-aws JAR"
      wait_for_file "/opt/hive/ext-jars/aws-java-sdk-bundle-*.jar" "AWS SDK bundle JAR"

      export HIVE_CONF_DIR=/opt/hive/conf
      export HADOOP_CONF_DIR=/opt/hive/conf
      export HIVE_AUX_JARS_PATH=/opt/hive/ext-jars
      export HADOOP_CLASSPATH=/opt/hive/ext-jars/*
      cp /opt/lakehouse/conf/hive-site.xml /opt/hive/conf/hive-site.xml
      cp /opt/lakehouse/conf/core-site.xml /opt/hive/conf/core-site.xml

      # apache/hive:3.1.3 can include an old PostgreSQL JDBC driver in /opt/hive/lib.
      # If that driver wins in the classpath, PostgreSQL SCRAM authentication fails with:
      # "The authentication type 10 is not supported".
      echo "Replacing bundled PostgreSQL JDBC driver, if present..."
      find /opt/hive/lib -maxdepth 1 -type f -name 'postgresql*.jar' -print -delete || true
      cp /opt/hive/ext-jars/postgresql-*.jar /opt/hive/lib/
      echo "PostgreSQL JDBC driver selected by Hive:"
      ls -lh /opt/hive/lib/postgresql*.jar

      echo "Using Hive configuration:"
      grep -A2 -B1 "javax.jdo.option.ConnectionURL" /opt/hive/conf/hive-site.xml || true
      grep -A2 -B1 "ConnectionDriverName" /opt/hive/conf/hive-site.xml || true
      echo "External Hive jars:"
      ls -lh /opt/hive/ext-jars

      POSTGRES_JDBC_URL="jdbc:postgresql://$${POSTGRES_HOST}:$${POSTGRES_PORT}/$${POSTGRES_DB}$${POSTGRES_JDBC_PARAMS}"
      echo "Waiting for external PostgreSQL at $${POSTGRES_HOST}:$${POSTGRES_PORT}..."
      for i in $$(seq 1 60); do
        if (echo > /dev/tcp/$${POSTGRES_HOST}/$${POSTGRES_PORT}) >/dev/null 2>&1; then
          echo "PostgreSQL is reachable."
          break
        fi
        if [ "$${i}" -eq 60 ]; then
          echo "ERROR: PostgreSQL is not reachable at $${POSTGRES_HOST}:$${POSTGRES_PORT}" >&2
          exit 1
        fi
        sleep 2
      done

      echo "Checking Hive Metastore schema..."
