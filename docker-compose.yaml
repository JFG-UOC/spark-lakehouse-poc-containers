      HIVE_METASTORE_ADVERTISED_HOST="$${HIVE_METASTORE_PUBLIC_HOST:-$${SPARK_PUBLIC_HOST}}"
      HIVE_METASTORE_ADVERTISED_PORT="$${HIVE_METASTORE_PORT:-9083}"
      HIVE_METASTORE_EFFECTIVE_URI="$${HIVE_METASTORE_URI:-thrift://$${HIVE_METASTORE_ADVERTISED_HOST}:$${HIVE_METASTORE_ADVERTISED_PORT}}"

      JAVA_NON_PROXY_HOSTS="$${no_proxy:-localhost,127.0.0.1}"
      JAVA_NON_PROXY_HOSTS="$$(printf '%s' "$${JAVA_NON_PROXY_HOSTS}" | sed 's/[[:space:]]//g; s/,/|/g; s/^\./*./; s/|\./|*./g')"
      JAVA_PROXY_OPTIONS="-Dhttp.nonProxyHosts=$${JAVA_NON_PROXY_HOSTS} -Dhttps.nonProxyHosts=$${JAVA_NON_PROXY_HOSTS}"

      echo "Waiting for Spark Master and Hive Metastore through public addresses..."
      for endpoint in "$${SPARK_PUBLIC_HOST}:$${SPARK_MASTER_PORT}" "$${HIVE_METASTORE_ADVERTISED_HOST}:$${HIVE_METASTORE_ADVERTISED_PORT}"; do
        host="$${endpoint%:*}"
        p="$${endpoint#*:}"
        for i in $$(seq 1 60); do
          if (echo > /dev/tcp/$${host}/$${p}) >/dev/null 2>&1; then
            echo "$${host}:$${p} is reachable."
            break
          fi
          if [ "$${i}" -eq 60 ]; then
            echo "ERROR: $${host}:$${p} is not reachable." >&2
            exit 1
          fi
          sleep 2
        done
      done

      echo "Starting Spark Thrift Server against $${SPARK_MASTER_URL}"
      echo "Thrift Server bind host: $${SPARK_THRIFT_EFFECTIVE_BIND_HOST}"
      echo "Thrift driver advertised as $${SPARK_THRIFT_ADVERTISED_HOST}:$${SPARK_THRIFT_DRIVER_PORT}"
      echo "Thrift resource footprint: driver=$${SPARK_THRIFT_DRIVER_MEMORY}, executor_instances=$${SPARK_THRIFT_EXECUTOR_INSTANCES}, executor_cores=$${SPARK_THRIFT_EXECUTOR_CORES}, executor_memory=$${SPARK_THRIFT_EXECUTOR_MEMORY}, cores_max=$${SPARK_THRIFT_CORES_MAX}"
      export SPARK_LOCAL_IP="$${SPARK_THRIFT_EFFECTIVE_BIND_HOST}"
      exec /opt/spark/sbin/start-thriftserver.sh --master "$${SPARK_MASTER_URL}" --driver-memory "$${SPARK_THRIFT_DRIVER_MEMORY}" --hiveconf hive.metastore.uris="$${HIVE_METASTORE_EFFECTIVE_URI}" --hiveconf hive.server2.thrift.bind.host="$${SPARK_THRIFT_EFFECTIVE_BIND_HOST}" --hiveconf hive.server2.thrift.port="$${SPARK_THRIFT_PORT}" --conf spark.driver.host="$${SPARK_THRIFT_ADVERTISED_HOST}" --conf spark.driver.bindAddress="$${SPARK_THRIFT_EFFECTIVE_BIND_HOST}" --conf spark.driver.port="$${SPARK_THRIFT_DRIVER_PORT}" --conf spark.blockManager.port="$${SPARK_THRIFT_BLOCKMANAGER_PORT}" --conf spark.ui.port="$${SPARK_THRIFT_UI_PORT}" --conf spark.executor.instances="$${SPARK_THRIFT_EXECUTOR_INSTANCES}" --conf spark.executor.cores="$${SPARK_THRIFT_EXECUTOR_CORES}" --conf spark.executor.memory="$${SPARK_THRIFT_EXECUTOR_MEMORY}" --conf spark.executor.memoryOverhead="$${SPARK_THRIFT_EXECUTOR_MEMORY_OVERHEAD}" --conf spark.cores.max="$${SPARK_THRIFT_CORES_MAX}" --conf spark.dynamicAllocation.enabled=false --conf spark.jars.ivy=/tmp/.ivy2 --conf spark.driver.extraJavaOptions="-Duser.home=/tmp -Divy.home=/tmp/.ivy2 $${JAVA_PROXY_OPTIONS}" --conf spark.executor.extraJavaOptions="$${JAVA_PROXY_OPTIONS}"
  spark-connect:
    image: apache/spark:3.5.6
    container_name: lakehouse-spark-connect
    user: root
    restart: unless-stopped
    network_mode: host
    cpus: ${SPARK_CONNECT_CPUS:-2.00}
    mem_limit: ${SPARK_CONNECT_MEMORY:-4g}
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      no_proxy: ${no_proxy:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-lakehouse-user}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-lakehouse-password}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://host.docker.internal:9000}
      S3_WAREHOUSE: ${S3_WAREHOUSE:-s3a://lakehouse/warehouse}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
      S3_SSL_ENABLED: ${S3_SSL_ENABLED:-false}
      SPARK_PUBLIC_HOST: ${SPARK_PUBLIC_HOST:?Set SPARK_PUBLIC_HOST to the host IP or DNS name reachable by Spark clients/workers}
      SPARK_CONNECT_PUBLIC_HOST: ${SPARK_CONNECT_PUBLIC_HOST:-}
      SPARK_CONNECT_BIND_HOST: ${SPARK_CONNECT_BIND_HOST:-}
      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
      HIVE_METASTORE_PUBLIC_HOST: ${HIVE_METASTORE_PUBLIC_HOST:-}
      HIVE_METASTORE_PORT: ${HIVE_METASTORE_PORT:-9083}
      HIVE_METASTORE_URI: ${HIVE_METASTORE_URI:-}
      SPARK_CONNECT_PORT: ${SPARK_CONNECT_PORT:-15002}
      SPARK_CONNECT_UI_PORT: ${SPARK_CONNECT_UI_PORT:-4050}
      SPARK_CONNECT_DRIVER_PORT: ${SPARK_CONNECT_DRIVER_PORT:-39100}
      SPARK_CONNECT_BLOCKMANAGER_PORT: ${SPARK_CONNECT_BLOCKMANAGER_PORT:-39101}
      SPARK_CONNECT_DRIVER_MEMORY: ${SPARK_CONNECT_DRIVER_MEMORY:-1g}
      SPARK_CONNECT_EXECUTOR_INSTANCES: ${SPARK_CONNECT_EXECUTOR_INSTANCES:-1}
      SPARK_CONNECT_EXECUTOR_CORES: ${SPARK_CONNECT_EXECUTOR_CORES:-1}
      SPARK_CONNECT_EXECUTOR_MEMORY: ${SPARK_CONNECT_EXECUTOR_MEMORY:-1g}
      SPARK_CONNECT_EXECUTOR_MEMORY_OVERHEAD: ${SPARK_CONNECT_EXECUTOR_MEMORY_OVERHEAD:-256m}
      SPARK_CONNECT_CORES_MAX: ${SPARK_CONNECT_CORES_MAX:-1}
      SPARK_CONNECT_VERSION: ${SPARK_CONNECT_VERSION:-3.5.6}
      SPARK_CONNECT_UNUSED_VERSION: ${SPARK_CONNECT_UNUSED_VERSION:-1.0.0}
      HOME: /tmp
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - lakehouse-conf:/opt/lakehouse/conf:ro
      - ${LOCAL_JARS_DIR:-./lakehouse-jars}:/opt/lakehouse/jars:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Podman Compose does not reliably support depends_on conditions.
    # Keep simple startup ordering here and let the command-level wait loops
    # validate files and TCP reachability before starting Spark Connect.
    depends_on:
      - lakehouse-config
      - spark-master
      - hive-metastore
    command:
      - /bin/bash
      - -lc
      - |
        set -e
        mkdir -p /opt/spark/conf /tmp/.ivy2 /tmp/spark-events
        chmod -R 777 /tmp/.ivy2 /tmp/spark-events

        wait_for_file() {
          pattern="$1"
          description="$2"
          for i in $$(seq 1 120); do
            if ls $${pattern} >/dev/null 2>&1; then
              echo "$${description} is available: $${pattern}"
              return 0
            fi
            sleep 1
          done
          echo "ERROR: timed out waiting for $${description}: $${pattern}" >&2
          exit 1
        }

        wait_for_file /opt/lakehouse/conf/spark-defaults.conf spark-defaults.conf
        wait_for_file /opt/lakehouse/conf/core-site.xml core-site.xml
        wait_for_file /opt/lakehouse/conf/hive-site.xml hive-site.xml
        wait_for_file "/opt/lakehouse/jars/spark/hadoop-aws-*.jar" "Spark hadoop-aws JAR"
        wait_for_file "/opt/lakehouse/jars/spark/aws-java-sdk-bundle-*.jar" "Spark AWS SDK bundle JAR"
        wait_for_file "/opt/lakehouse/jars/connect/org.apache.spark_spark-connect_2.12-*.jar" "Spark Connect JAR"
        wait_for_file "/opt/lakehouse/jars/connect/org.spark-project.spark_unused-*.jar" "Spark Connect unused marker JAR"
        wait_for_file "/opt/lakehouse/jars/ivy/hive-metastore-*.jar" "Hive Metastore client JAR"
        wait_for_file "/opt/lakehouse/jars/ivy/hive-exec-*.jar" "Hive exec client JAR"

        cp /opt/lakehouse/conf/spark-defaults.conf /opt/spark/conf/spark-defaults.conf
        cp /opt/lakehouse/conf/core-site.xml /opt/spark/conf/core-site.xml
        cp /opt/lakehouse/conf/hive-site.xml /opt/spark/conf/hive-site.xml

        SPARK_MASTER_URL="spark://$${SPARK_PUBLIC_HOST}:$${SPARK_MASTER_PORT}"
        SPARK_CONNECT_ADVERTISED_HOST="$${SPARK_CONNECT_PUBLIC_HOST:-$${SPARK_PUBLIC_HOST}}"
        SPARK_CONNECT_EFFECTIVE_BIND_HOST="$${SPARK_CONNECT_BIND_HOST:-$${SPARK_CONNECT_ADVERTISED_HOST}}"
        HIVE_METASTORE_ADVERTISED_HOST="$${HIVE_METASTORE_PUBLIC_HOST:-$${SPARK_PUBLIC_HOST}}"
        HIVE_METASTORE_ADVERTISED_PORT="$${HIVE_METASTORE_PORT:-9083}"
        HIVE_METASTORE_EFFECTIVE_URI="$${HIVE_METASTORE_URI:-thrift://$${HIVE_METASTORE_ADVERTISED_HOST}:$${HIVE_METASTORE_ADVERTISED_PORT}}"

        JAVA_NON_PROXY_HOSTS="$${no_proxy:-localhost,127.0.0.1}"
        JAVA_NON_PROXY_HOSTS="$$(printf '%s' "$${JAVA_NON_PROXY_HOSTS}" | sed 's/[[:space:]]//g; s/,/|/g; s/^\./*./; s/|\./|*./g')"
        JAVA_PROXY_OPTIONS="-Dhttp.nonProxyHosts=$${JAVA_NON_PROXY_HOSTS} -Dhttps.nonProxyHosts=$${JAVA_NON_PROXY_HOSTS}"

        echo "Waiting for Spark Master and Hive Metastore through public addresses..."
        for endpoint in "$${SPARK_PUBLIC_HOST}:$${SPARK_MASTER_PORT}" "$${HIVE_METASTORE_ADVERTISED_HOST}:$${HIVE_METASTORE_ADVERTISED_PORT}"; do
          host="$${endpoint%:*}"
          p="$${endpoint#*:}"
          for i in $$(seq 1 60); do
            if (echo > /dev/tcp/$${host}/$${p}) >/dev/null 2>&1; then
              echo "$${host}:$${p} is reachable."
              break
            fi
            if [ "$${i}" -eq 60 ]; then
              echo "ERROR: $${host}:$${p} is not reachable." >&2
              exit 1
            fi
            sleep 2
          done
        done

        SPARK_CONNECT_JARS="/opt/lakehouse/jars/connect/org.apache.spark_spark-connect_2.12-$${SPARK_CONNECT_VERSION}.jar,/opt/lakehouse/jars/connect/org.spark-project.spark_unused-$${SPARK_CONNECT_UNUSED_VERSION}.jar"

        echo "Starting Spark Connect Server against $${SPARK_MASTER_URL}"
        echo "Spark Connect gRPC endpoint: sc://$${SPARK_CONNECT_ADVERTISED_HOST}:$${SPARK_CONNECT_PORT}"
        echo "Spark Connect bind host: $${SPARK_CONNECT_EFFECTIVE_BIND_HOST}"
        echo "Spark Connect driver advertised as $${SPARK_CONNECT_ADVERTISED_HOST}:$${SPARK_CONNECT_DRIVER_PORT}"
        echo "Spark Connect JARs: $${SPARK_CONNECT_JARS}"
        echo "Spark Connect resource footprint: driver=$${SPARK_CONNECT_DRIVER_MEMORY}, executor_instances=$${SPARK_CONNECT_EXECUTOR_INSTANCES}, executor_cores=$${SPARK_CONNECT_EXECUTOR_CORES}, executor_memory=$${SPARK_CONNECT_EXECUTOR_MEMORY}, cores_max=$${SPARK_CONNECT_CORES_MAX}"

        export SPARK_LOCAL_IP="$${SPARK_CONNECT_EFFECTIVE_BIND_HOST}"
        export SPARK_DIST_CLASSPATH="/opt/lakehouse/jars/spark/*:/opt/lakehouse/jars/connect/*$${SPARK_DIST_CLASSPATH:+:$${SPARK_DIST_CLASSPATH}}"

        exec /opt/spark/sbin/start-connect-server.sh \
          --master "$${SPARK_MASTER_URL}" \
          --driver-memory "$${SPARK_CONNECT_DRIVER_MEMORY}" \
          --jars "$${SPARK_CONNECT_JARS}" \
          --conf spark.connect.grpc.binding.port="$${SPARK_CONNECT_PORT}" \
          --conf spark.driver.host="$${SPARK_CONNECT_ADVERTISED_HOST}" \
          --conf spark.driver.bindAddress="$${SPARK_CONNECT_EFFECTIVE_BIND_HOST}" \
          --conf spark.driver.port="$${SPARK_CONNECT_DRIVER_PORT}" \
          --conf spark.blockManager.port="$${SPARK_CONNECT_BLOCKMANAGER_PORT}" \
          --conf spark.ui.port="$${SPARK_CONNECT_UI_PORT}" \
          --conf spark.sql.catalogImplementation=hive \
          --conf spark.hadoop.hive.metastore.uris="$${HIVE_METASTORE_EFFECTIVE_URI}" \
          --conf spark.executor.instances="$${SPARK_CONNECT_EXECUTOR_INSTANCES}" \
          --conf spark.executor.cores="$${SPARK_CONNECT_EXECUTOR_CORES}" \
          --conf spark.executor.memory="$${SPARK_CONNECT_EXECUTOR_MEMORY}" \
          --conf spark.executor.memoryOverhead="$${SPARK_CONNECT_EXECUTOR_MEMORY_OVERHEAD}" \
          --conf spark.cores.max="$${SPARK_CONNECT_CORES_MAX}" \
          --conf spark.dynamicAllocation.enabled=false \
          --conf spark.driver.extraClassPath=/opt/lakehouse/jars/spark/*:/opt/lakehouse/jars/connect/* \
          --conf spark.executor.extraClassPath=/opt/lakehouse/jars/spark/*:/opt/lakehouse/jars/connect/* \
          --conf spark.jars.ivy=/tmp/.ivy2 \
          --conf spark.driver.extraJavaOptions="-Duser.home=/tmp -Divy.home=/tmp/.ivy2 $${JAVA_PROXY_OPTIONS}" --conf spark.executor.extraJavaOptions="$${JAVA_PROXY_OPTIONS}"

volumes:
  lakehouse-conf: {}
